<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Tracker</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

    <h2 class="mb-4">Expense Tracker</h2>

    <!-- Add Expense Form -->
    <form id="expenseForm" class="mb-4">

        <div class="mb-2">
            <input
                type="number"
                step="0.01"
                id="amount"
                class="form-control"
                placeholder="Amount"
                required
            >
        </div>

        <div class="mb-2">
            <input
                type="text"
                id="category"
                class="form-control"
                placeholder="Category"
                required
            >
        </div>

        <div class="mb-2">
            <input
                type="text"
                id="description"
                class="form-control"
                placeholder="Description"
                required
            >
        </div>

        <div class="mb-2">
            <input
                type="date"
                id="date"
                class="form-control"
                required
            >
        </div>

        <button type="submit" class="btn btn-primary">
            Add Expense
        </button>
    </form>

    <!-- Filter + Sort -->
    <div class="mb-4">

        <input
            type="text"
            id="filterCategory"
            class="form-control mb-2"
            placeholder="Filter by Category"
        >

        <!-- Fixed Apply Filter Button -->
        <button
            type="button"
            onclick="applyFilter()"
            class="btn btn-secondary"
        >
            Apply Filter
        </button>

        <!-- Fixed Sort Button -->
        <button
            type="button"
            onclick="sortByDate()"
            class="btn btn-info"
        >
            Sort by Date
        </button>

    </div>

    <!-- Total -->
    <h4 id="total" class="mb-3">
        Total: ₹0
    </h4>

    <!-- Expense Table -->
    <table class="table table-bordered">
        <thead>
            <tr>
                <th>Amount</th>
                <th>Category</th>
                <th>Description</th>
                <th>Date</th>
            </tr>
        </thead>

        <tbody id="expenseTable"></tbody>
    </table>

    <script src="script.js"></script>

</body>
</html>
